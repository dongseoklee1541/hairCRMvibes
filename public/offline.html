<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F4F1" />
    <meta name="robots" content="noindex" />
    <title>오프라인 · 미용실 CRM</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Outfit, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1a1918;
        background: #f5f4f1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100dvh;
        background: #f5f4f1;
      }

      .page {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px
          max(32px, env(safe-area-inset-bottom));
      }

      .content {
        width: min(100%, 382px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }

      .icon-wrap {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        margin-bottom: 4px;
        border-radius: 50%;
        color: #d89575;
        background: #f5dfd0;
      }

      .message {
        display: grid;
        gap: 10px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.25;
      }

      .description {
        color: #6b6966;
        font-size: 15px;
        line-height: 1.5;
      }

      .status {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border: 1px solid #eeecea;
        border-radius: 999px;
        color: #6b6966;
        background: #fff;
        font-size: 13px;
        font-weight: 600;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #d89575;
      }

      .status[data-online="true"] .status-dot {
        background: #3d8a5a;
      }

      .privacy-notice {
        width: 100%;
        padding: 14px 18px;
        border-radius: 12px;
        color: #6b6966;
        background: #fff;
        font-size: 13px;
        line-height: 1.5;
      }

      .retry-button {
        width: 100%;
        min-height: 52px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 12px;
        color: #fff;
        background: #3d8a5a;
        font: inherit;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .retry-button:focus-visible {
        outline: 3px solid #c8f0d8;
        outline-offset: 3px;
      }

      .retry-button:active {
        transform: translateY(1px);
      }

      .hint {
        color: #9c9894;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="content" aria-labelledby="offline-title">
        <div class="icon-wrap" aria-hidden="true">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M2 8.82A15 15 0 0 1 5.3 7M10.66 5.13A15.9 15.9 0 0 1 22 8.82M5 12.86a10 10 0 0 1 1.76-1.14M9.53 10.38A10 10 0 0 1 19 12.86M8.5 16.43a5 5 0 0 1 7 0M12 20h.01M3 3l18 18"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <div class="message">
          <h1 id="offline-title">인터넷 연결을 확인해 주세요</h1>
          <p class="description">연결이 복구되면 최신 예약과 고객 정보를 다시 불러올 수 있어요.</p>
        </div>

        <div class="status" id="network-status" role="status" aria-live="polite" data-online="false">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="network-status-label">현재 오프라인</span>
        </div>

        <p class="privacy-notice">
          예약·고객 정보는 연결 후 최신 상태로 표시되며, 오프라인 캐시에 저장하지 않습니다.
        </p>

        <button class="retry-button" id="retry-connection" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          다시 연결하기
        </button>

        <p class="hint">네트워크가 복구되면 자동으로 페이지를 새로고침합니다.</p>
      </section>
    </main>

    <script>
      (() => {
        const status = document.getElementById('network-status');
        const statusLabel = document.getElementById('network-status-label');
        const retryButton = document.getElementById('retry-connection');

        const updateNetworkState = (isOnline) => {
          status.dataset.online = String(isOnline);
          statusLabel.textContent = isOnline ? '연결이 복구되었습니다' : '현재 오프라인';
        };

        retryButton.addEventListener('click', () => {
          window.location.reload();
        });

        window.addEventListener('online', () => {
          updateNetworkState(true);
          window.location.reload();
        });
        window.addEventListener('offline', () => updateNetworkState(false));
      })();
    </script>
  </body>
</html>
